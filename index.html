<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INM420 | Three.js Interactive Demo</title>
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Three.js Product Showcase</h1>
        <p>Drag to orbit, scroll to zoom, and click glowing hotspots to inspect features.</p>
        <p id="model-status" class="model-status" aria-live="polite">Loading showcase model...</p>
        <button id="reset-view-btn" type="button">Reset View</button>
      </header>
      <div id="scene-root" aria-label="Interactive 3D scene"></div>
      <aside id="hotspot-tooltip" class="hotspot-tooltip is-hidden" aria-live="polite">
        <h2 id="hotspot-title">Feature</h2>
        <p id="hotspot-description">Click a hotspot to inspect this part of the product.</p>
      </aside>
    </main>
    <script type="module" src="/3js/assets/js/main.js"></script>
  </body>
</html>
